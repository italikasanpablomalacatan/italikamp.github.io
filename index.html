<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo Italika</title>
  <link rel="stylesheet" href="styles.css?v=7.1" />
</head>
<body>
  <div class="background"></div>

  <header class="hero">
    <img class="hero-logo" src="assets/img/logo-header.png" alt="Italika Malacatán" onerror="this.src='assets/img/logo-malacatan.png'">
    <p class="hero-kicker">CATÁLOGO DE MOTOCICLETAS</p>
    <p class="hero-text">Modelos disponibles, precios de contado y atención directa por WhatsApp.</p>
  </header>

  <main class="page">
    <aside class="sidebar glass" id="categories"></aside>

    <section class="catalog">
      <div class="controls">
        <label class="search glass">
          <span>⌕</span>
          <input id="searchInput" type="search" placeholder="Buscar modelo, categoría o SKU..." />
        </label>

        <select id="sortSelect" class="select glass">
          <option value="default">Ordenar</option>
          <option value="priceAsc">Precio: menor a mayor</option>
          <option value="priceDesc">Precio: mayor a menor</option>
          <option value="nameAsc">Modelo A-Z</option>
        </select>
      </div>

      <div class="grid" id="grid"></div>
    </section>
  </main>

  <button class="float-btn" id="floatBtn">
    <span>☎</span>
    <b>Contactar</b>
  </button>

  <div class="modal" id="motoModal">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card glass">
      <button class="close" data-close>×</button>
      <div class="modal-photo"><img id="modalImg" alt=""></div>
      <div class="modal-content">
        <span class="badge" id="modalCategory"></span>
        <h2 id="modalName"></h2>
        <p id="modalDetail"></p>
        <div class="price-panel">
          <small>Precio de contado</small>
          <strong id="modalPrice"></strong>
        </div>
        <div class="info-row">
          <span>SKU: <b id="modalSku"></b></span>
          <span>Código: <b id="modalCode"></b></span>
        </div>
        <button class="primary" id="modalInterest">Me interesa esto</button>
      </div>
    </div>
  </div>

  <div class="modal" id="agencyModal">
    <div class="modal-backdrop" data-close-agency></div>
    <div class="agency-card glass">
      <button class="close" data-close-agency>×</button>
      <h2>¿Con qué agencia deseas comunicarte?</h2>
      <p id="agencyText">Te enviaremos a WhatsApp.</p>
      <div class="agency-list">
        <button class="agency" data-agency="malacatan">
          <img src="assets/img/logo-malacatan.png" alt="Malacatán">
          <span>Malacatán</span>
        </button>
        <button class="agency" data-agency="sanpablo">
          <img src="assets/img/logo-sanpablo.png" alt="San Pablo">
          <span>San Pablo</span>
        </button>
      </div>
    </div>
  </div>

  <footer>© 2026 Italika Malacatán / San Pablo</footer>

  <script src="data.js?v=7.1"></script>
  <script src="app.js?v=7.1"></script>
</body>
</html>
